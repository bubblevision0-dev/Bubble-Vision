{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Super Admin Login</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="{% static 'css/login.css' %}">
  <style>
    /* ===== Alignment Fix Pack ===== */
        .login-wrapper{
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 24px 14px;
        box-sizing: border-box;
        }

        .branding-section{
        width: 100%;
        max-width: 420px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        margin-bottom: 16px;
        }

        .school-logo{
        display: block;
        margin: 0 auto;
        }

        .school-subtitle{
        text-align: center;
        margin-top: 10px;
        }

        .login-card{
        width: 100%;
        max-width: 420px;
        box-sizing: border-box;
        }

        .login-form{
        width: 100%;
        }

        .form-group{
        width: 100%;
        margin-bottom: 14px;
        text-align: left;
        }

        .form-control{
        width: 100%;
        box-sizing: border-box;
        }

        /* Password icon perfectly centered */
        .password-wrapper{
        position: relative;
        width: 100%;
        }

        .password-wrapper .form-control{
        padding-right: 44px; /* space for icon */
        }

        .toggle-password{
        position: absolute;
        top: 50%;
        right: 12px;
        transform: translateY(-50%);
        border: none;
        background: transparent;
        padding: 0;
        cursor: pointer;
        color: #1c4fa3;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 34px;
        height: 34px;
        }

        .toggle-password:hover{
        color: #003b73;
        }

        .btn-login{
        width: 100%;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        }

        /* Messages aligned + consistent */
        .msg-wrap{
        margin-top: 14px;
        text-align: left;
        }

        .msg{
        padding: 10px 12px;
        border-radius: 10px;
        margin-bottom: 8px;
        background: rgba(255,255,255,0.6);
        border: 1px solid rgba(130,182,255,0.7);
        color: #003b73;
        }

        .msg-error{
        border: 1px solid rgba(255,0,0,0.25);
        color: #b91c1c;
        }

  </style>
</head>

<body>
  <div class="background-overlay"></div>

  <div class="login-wrapper">

    <div class="branding-section">
      <img src="{% static 'images/logo.png' %}" alt="School Logo" class="school-logo" />
      <div class="school-subtitle">Super Admin Access</div>
    </div>

    <div class="login-card">
      <div class="login-title">Login as Super Admin</div>
      <div class="login-sub">Enter your credentials to continue</div>

      <form method="post" autocomplete="off" class="login-form">
        {% csrf_token %}

        <div class="form-group">
          <label class="form-label" for="username">Username</label>
          <input class="form-control" type="text" id="username" name="username" required>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>

          <div class="password-wrapper">
            <input class="form-control" type="password" id="password" name="password" required>
            <button type="button" class="toggle-password" id="togglePassword" aria-label="Show/Hide Password">
              <i class="fa-solid fa-eye"></i>
            </button>
          </div>
        </div>

        <button class="btn-login" type="submit">
          <i class="fa-solid fa-right-to-bracket"></i>
          Login
        </button>

        {% if messages %}
          <div class="msg-wrap">
            {% for message in messages %}
              <div class="msg">{{ message }}</div>
            {% endfor %}
          </div>
        {% endif %}

        {% if error %}
          <div class="msg-wrap">
            <div class="msg msg-error">{{ error }}</div>
          </div>
        {% endif %}
      </form>
    </div>
  </div>

  <script>
    (function () {
      const toggleBtn = document.getElementById("togglePassword");
      const input = document.getElementById("password");
      if (!toggleBtn || !input) return;

      toggleBtn.addEventListener("click", function () {
        const isPassword = input.type === "password";
        input.type = isPassword ? "text" : "password";
        toggleBtn.innerHTML = isPassword
          ? '<i class="fa-solid fa-eye-slash"></i>'
          : '<i class="fa-solid fa-eye"></i>';
      });
    })();
  </script>
</body>
</html>
