{% extends 'analysis/base.html' %}
{% load static %}
{% block content %}
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="{% static 'css/grade.css' %}">

<div class="grade-container">
  <h2>Delete Grade</h2>
  <p>Are you sure you want to delete the grade <strong>{{ grade.name }}</strong>?</p>

  <form method="post">
    {% csrf_token %}
    <button type="submit" class="btn-delete">Yes, Delete</button>
    <a href="{% url 'add_grade' %}" class="btn-cancel">Cancel</a>
  </form>
</div>
{% endblock %}
